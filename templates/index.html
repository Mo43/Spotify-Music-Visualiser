{% extends "base.html" %}

{% block content %}
    <h1 class="mb-4">🎵 My Top Tracks</h1>
    <ul class="list-group">
        {% for song in songs %}
            <li class="list-group-item bg-secondary text-white">
                {{ loop.index }}. {{ song[0] }} by {{ song[1] }} | {{ song[2] }} | {{ song[3] }}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
