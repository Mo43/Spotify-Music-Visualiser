{% extends "base.html" %}

{% block content %}
    <h1 class="mb-4">🎤 My Top Artists</h1>
    <ul class="list-group">
        {% for artist in artists %}
        <li class ="list-group-item bg-secondary text-white">
            {{ loop.index }}. {{ artist[1] }}
            <a class ="ms-2" href="https://open.spotify.com/artist/{{ artist[1] }}" target="_blank" rel="noopener">View on Spotify </a>
        </li>
        {% endfor %}
    </ul>
{% endblock %}
